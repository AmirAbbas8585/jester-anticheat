    # AutoParkour — pixel-perfect edge-jump timing every jump
    # AutoParkour — relaxed: skilled players on a parkour server hit many edge
    # jumps legitimately. More samples + higher ratio + more chances before kick.
    AutoParkour:
        enabled: true
        punishable: true
        max-violations: 8
        alert-interval: 1
        dont-alert-until: 4
        alert-cooldown-ms: 3000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMovement&8 &7ping: %ping%ms&8)'

    # RotationPlace — placing a block while not looking at it (scaffold).
    # Most FP-prone scaffolding check on cross-version (ViaBackwards/1.8 rapid yaw)
    # servers, so it's given a high tolerance. Other scaffolding checks
    # (ScaffoldGoDown, FastPlace, AirLiquidPlace) carry the real punishment weight.
    RotationPlace:
        enabled: true
        punishable: true
        max-violations: 25
        alert-interval: 1
        dont-alert-until: 6
        alert-cooldown-ms: 2000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bScaffold&8 &7ping: %ping%ms&8)'

    # PacketLimit — hard packet-rate ceiling. Rarely FPs except on lag spikes
    # (already grace-windowed on join/pack-load), so high tolerance.
    PacketLimit:
        enabled: true
        # Alert-only by default for the beta — timing checks behind a proxy
        # (ajQueue) + ViaBackwards are jitter-prone; trust before enabling kicks.
        punishable: false
        max-violations: 20
        alert-interval: 1
        dont-alert-until: 6
        alert-cooldown-ms: 2000
        # Timer's own algorithm is already designed to self-compensate for ping
        # (it measures against the player's OWN clock, not a flat wall-clock
        # window — see the long comment at the top of Timer.java), so adding
        # ad-hoc ping-scaling on top would be redundant/risk hiding real timer
        # hacks. The real correlated factor (same root cause as FastBreak) is
        # SERVER TPS dips distorting timing measurement — raised in line with
        # FastBreak's fix, now that minimum-tps is actually enforced.
        minimum-tps: 19.0
        punishment-commands:
            # %ping% shows whether this was likely a real connection spike
            # (proxy hop, bad mobile connection) rather than an actual timer hack.
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMovement&8 &7ping: %ping%ms&8)'

