    # NoJumpDelay — jumping too quickly after landing
    # DISABLED by default: vanilla bunny-hopping (holding space) legitimately
    # re-jumps instantly on every landing — the 10-tick jump cooldown expires
    # mid-air, and tapping the key resets it entirely. There is no reliable
    # packet signature that separates this hack from normal jumping.
    NoJumpDelay:
        enabled: false
        punishable: false
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
