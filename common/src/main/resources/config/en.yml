    # TransactionOrder — client's transaction response skipped one or more
    # pending IDs. The implementation's own comment explicitly tolerates this
    # by design ("if some error made a client miss a packet, it won't hurt
    # them too bad") — it's a packet-loss/network signal, not a reliable cheat
    # indicator on its own. Alert-only so staff still see it; never punishes.
    TransactionOrder:
        enabled: true
        punishable: false
        max-violations: 20
        alert-interval: 1
        dont-alert-until: 5
        alert-cooldown-ms: 2000
        minimum-tps: 19.5
        punishment-commands: []

    # ── Scaffolding/Placing ───────────────────────────────────────────────────

    # AirPlace — placing a block against air / liquid (no valid support).
    # High max-violations because legit break+place-in-same-tick can flag 1-2x;
    # sustained air-placing (the cheat) racks up fast.
    AirLiquidPlace:
        enabled: true
        punishable: true
        max-violations: 8
        alert-interval: 1
        # The check's own author notes a VL of 1 isn't reliable signal on its
        # own (documented history of fighting false positives from same-tick
        # break+place desyncs) — 4 already gives reasonable headroom.
        dont-alert-until: 4
        alert-cooldown-ms: 1500
        minimum-tps: 19.5
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bScaffold&8 &7ping: %ping%ms&8)'

