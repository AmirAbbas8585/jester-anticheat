        dont-alert-until: 3
        alert-cooldown-ms: 1500
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bScaffold&8 &7ping: %ping%ms&8)'

    # ScaffoldGoDown — automated descending staircase block placement
    ScaffoldGoDown:
        enabled: true
        punishable: true
        max-violations: 5
