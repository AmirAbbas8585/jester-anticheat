# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                          J E S T E R   A N T I C H E A T                   ║
# ║                            configuration · v0.0.1                          ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  How this file works:                                                      ║
# ║   • Every check has its own block under "checks:" further down. There you  ║
# ║     turn it on/off, set how many violations trigger a punishment, and      ║
# ║     choose which command runs (kick, ban, ...).                            ║
# ║   • Values that aren't set per-check fall back to "alert-defaults" below.  ║
# ║   • Colours accept legacy codes (&a) and hex (&#rrggbb).                   ║
# ║   • Edit, then run /jester reload in-game to apply without a restart.       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

#  ◆────────────────────────────────────────────────────────────────────────◆
#    ALERTS  ·  how violation alerts look and where they go
#  ◆────────────────────────────────────────────────────────────────────────◆

# Shown at the start of every plugin message.
prefix: '&#c19a6bᴊᴇꜱᴛᴇʀ &8»'

alerts:
    # Should alerts be printed to the console?
    print-to-console: true
    # Alert message format. Placeholders: %player% %check_name% %vl% %verbose% %ping% %tps% %version%
    format: '%prefix% &#c19a6b%player% &fhas failed &#c19a6b%check_name% &8[&#c19a6bx%vl% &8| &#c19a6b%ping%ms&8]'
    # Console format (no color codes needed)
    console-format: '&8[&#c19a6bᴊ&8] %player% failed %check_name% (x%vl%) | %verbose%'
    # Cross-server alert forwarding (BungeeCord/Velocity networks).
    #   send    — broadcast this server's alerts to every other server on the
    #             proxy that also runs Jester.
    #   receive — also show alerts forwarded here from those other servers.
    # Needs bungeecord/velocity enabled in spigot.yml / paper-global.yml
    # (detected automatically).
    network:
        send: true
        receive: true
    # Also mirror verbose alerts (every single flag) to the console.
    verbose-to-console: false

# Toggle alerts on join for players with jester.alerts permission
toggle-alerts-on-join: true

#  ◆────────────────────────────────────────────────────────────────────────◆
#    DETECTION  ·  transient grace windows + beta-check policy
#  ◆────────────────────────────────────────────────────────────────────────◆

# Transient-state grace: movement/timer checks don't flag during these windows
# because the client legitimately desyncs (no kick for a state it didn't cause).
movement-grace:
    # Right after joining — player may spawn mid-air (logged out falling/flying),
    # chunks still loading, etc. Resource-pack download is graced automatically
    # until the client reports it loaded (max 30s).
    join-ms: 3000

# Experimental checks (BadPackets, MultiActions, Sprint, Elytra, Vehicle,
# NoSwingBreak, MultiPlace, ...). These ~39 checks are still maturing and can
# false-flag legitimate play (e.g. a fast key combo on 1.21.2+). They stay ON so
# staff still see their alerts/logs, but — thanks to the next option — they only
# warn, never punish, until you explicitly trust one.
beta-checks: true

# Master safety switch for the checks above: while this is false, NO beta check
# can kick/ban, even if its own punishable is true — it can only alert/log.
# Turn it on only after you've watched a specific check flag correctly with no
# false positives.
beta-checks-punishable: false


#  ◆────────────────────────────────────────────────────────────────────────◆
#    DEFAULTS  ·  fallback alert + punish behaviour for every check
#    (anything a check doesn't set itself under "checks:" comes from here)
#  ◆────────────────────────────────────────────────────────────────────────◆
alert-defaults:
    # Send alert every N violations. 1 = every violation. 2 = every 2nd. 5 = every 5th.
    alert-interval: 1
    # Don't send alert until violations >= this value (suppresses early noise).
    # Applies to checks WITHOUT their own block (GroundSpoof, PacketLimit,
    # TickTimer, ...) — raised so a stray flag from those doesn't spam chat.
    dont-alert-until: 3
    # Minimum milliseconds between consecutive alerts for the same check on the same player.
    # Prevents burst-spam when simulation engine fires 1-100 flags at once.
    alert-cooldown-ms: 1000
    # Below this TPS, checks are paused. The movement prediction assumes a stable
    # 20 TPS, so even a small dip (a check false-flagging at ~19.8 TPS is common)
    # can desync any check — not just the timing-based ones. This is the global
    # fallback; a check can override it with its own minimum-tps.
    minimum-tps: 19.5
    # Default max violations before punishment
    max-violations: 20
    punishable: true
    # Minimum time (ms) a violation streak must last BEFORE a kick/punishment is
    # allowed to fire, even if max-violations was already reached. Some checks
    # (MovementA, combat) can flag several times in a fraction of a second
    # during a lag/desync burst, which used to instantly reach max-violations and
    # kick a player who never saw the count climb ("kicked out of nowhere"). This
    # forces the violations to be sustained over real time first: a genuine cheat
    # easily keeps flagging for this long, a one-off burst decays away. Set to 0
    # to restore the old instant behaviour. Per-check override: punish-grace-ms.
    punish-grace-ms: 2000

#  ◆────────────────────────────────────────────────────────────────────────◆
#    STORAGE  ·  where violations / punishments / profiles are logged
#  ◆────────────────────────────────────────────────────────────────────────◆
# SQLite by default, or switch type to mysql for remote/website access.
# All violations, punishments, and player profiles are logged here — usable
# later from a website (tables: jester_violations, jester_punishments,
# jester_profiles; each row has ping/tps/timestamp).
# SQLite file: plugins/JesterAntiCheat/jester.db — for website access from
# another host, switch type to mysql.
database:
    enabled: true
    type: sqlite          # sqlite or mysql
    host: localhost
    port: 3306
    database: jester
    username: root
    password: ''
    pool-size: 5
    # Minimum time between DB writes for the SAME player+check. A false-positive
    # streak (e.g. a check flagging every tick) used to write a row every 250ms,
    # flooding the table with thousands of rows in minutes. The vl column is
    # cumulative, so raising this loses no real signal — only redundant rows.
    log-throttle-ms: 2000
    # Violation log rows older than this are automatically deleted (checked
    # hourly, plus once immediately on startup). Keeps the table from growing
    # forever from routine flags. Punishments are NOT auto-purged (kept as a
    # permanent record) — only the high-volume raw violation log is.
    violation-retention-hours: 6

#  ◆────────────────────────────────────────────────────────────────────────◆
#    INTEGRATIONS  ·  play nice with other plugins (auto-detected)
#  ◆────────────────────────────────────────────────────────────────────────◆
# Each toggle is AUTO-DETECTED: it only does anything when the matching plugin
# is actually installed and enabled. If the plugin isn't present the toggle is
# simply ignored (no errors), so leaving these on is always safe. Set one to
# false to force that specific compatibility behaviour OFF even when the plugin
# IS installed.
integrations:
    # Exempt GSit sitting/crawling/laying players from movement checks
    gsit-exempt-movement: true
    # Soften velocity checks for DeluxeCombat/CrazyEnchantments custom knockback
    deluxecombat-kb-tolerance: true
    # AuraSkills: account for speed/jump bonuses in movement checks
    auraskills-movement-boost: true
    # WorldGuard: exempt players in fly-allowed regions from flight checks
    worldguard-fly-regions: true
    # ItemsAdder: use custom block hardness for FastBreak/Nuker checks
    itemsadder-custom-blocks: true

#  ◆────────────────────────────────────────────────────────────────────────◆
#    UPDATES  ·  tell the console + staff when a newer build is out
#  ◆────────────────────────────────────────────────────────────────────────◆
# Checks Modrinth for newer releases of this plugin and notifies the console +
# staff. The update source is fixed (the official Modrinth project) and cannot be
# changed here — only turned on/off.
update-checker:
    enabled: true
    # Re-check every N minutes while the server runs (0 = only once at startup).
    interval-minutes: 180
    # Permission a player needs to be told about updates on join.
    notify-permission: 'jester.update'

#  ◆────────────────────────────────────────────────────────────────────────◆
#    MOVEMENT  ·  physics & speed tuning
#  ◆────────────────────────────────────────────────────────────────────────◆
# Replays each player's movement server-side and compares it to what they sent.
# "offset" is how far the two disagree per tick; a real fly/speed hack sustains a
# large offset, normal play produces tiny ones. Thresholds below set tolerance.
MovementA:
    buildup-keep-ratio: 0.999
    # Per-tick offset that counts as a violation. Half-blocks (slabs, chests,
    # trapped chests) and Via/ItemsAdder collision quirks produce tiny offsets.
    # Real production logs across many UNRELATED players repeatedly showed the
    # EXACT SAME decimal offsets (.030177, .015151, .024895 — bit-for-bit
    # identical across different players/times, sneak=false carpet=false
    # water=false, normal TPS/ping every time). A real fly/speed hack produces
    # offsets that vary with the specific hack/velocity used — it does NOT
    # reproduce an identical number across unrelated players. That signature
    # means this is a deterministic engine/physics quirk (likely a common
    # movement transition, e.g. landing/step-up), not cheating. Raised well
    # above that whole cluster; instant-rubberband-offset below still
    # catches a genuinely large single-tick jump regardless.
    # Loosened again for the public beta — reports of stray flags on normal
    # movement persisted at 0.02, so the base bar is raised. A real fly/speed
    # hack still produces a sustained, much larger offset every tick.
    # Raised once more (0.025 -> 0.04): real logs showed a player flagging a
    # tight, recurring cluster of offsets around .033-.039 at a perfect 20 TPS
    # with no sneak/carpet/bed/water — the same deterministic engine-quirk
    # signature, sitting just above the old 0.025 bar. 0.04 clears that whole
    # cluster; a real speed/fly hack sustains far larger offsets (0.1+).
    min-offset: 0.04
    # Higher offset bar applied only while the player is sneaking (vanilla shift).
    # Sneak movement near block edges (slabs/stairs/chests), especially on
    # ViaBackwards/1.8 clients, produces noisy offsets up to ~0.01-0.03 that are
    # NOT cheating. Real production logs showed a sustained, repeating offset
    # cluster around ~0.015 (with outliers to ~0.0297) during normal sneak-walk —
    # the previous 0.015 threshold sat right in the middle of that cluster
    # instead of above it. Sneak speed is too slow for speed/fly to matter, so
    # raising this further is safe; only weakens detection of a hack that's
    # already pointless to run while sneaking.
    min-offset-sneak: 0.04
    # Higher threshold while standing on carpet (any color, or moss carpet).
    # Carpet's collision box is only 1/16 block tall, and real logs showed a
    # sustained ~0.015-0.018 offset just from walking normally on it (not
    # sneaking) — a known collision-simulation quirk for this thin shape,
    # not a speed exploit (carpet doesn't change movement speed).
    min-offset-carpet: 0.03
    # Higher threshold while on/near a bed. Beds have an asymmetric, reduced-
    # height collision shape (head/foot halves) — real logs showed a sustained,
    # repeating ~0.028-0.031 offset (the exact same value recurring — a
    # deterministic engine quirk, not noise) from jump-spamming on a bed
    # corner. Not a speed exploit; jumping on a bed doesn't change speed.
    min-offset-bed: 0.035
    # Higher threshold while in water. Buoyancy/current/swim-pose physics is the
    # most false-positive-prone movement to simulate exactly (depth strider,
    # dolphin's grace, current pushes, hitbox pose change) and a speed/fly hack
    # is far less useful underwater anyway. Reported as a recurring source of
    # stray MovementA flags, so this is tolerant by design.
    min-offset-water: 0.04
    instant-rubberband-offset: 0.1
    # Extra per-tick offset tolerance added per ms of ping above the baseline.
    # Higher ping = more uncertainty about exactly when an input applied, which
    # shows up as small extra offset that isn't cheating. Raised for the beta
    # since most reported false flags came from 70-150ms players and mobile
    # (PojavLauncher) jitter.
    lag-grace-start-ms: 60
    lag-grace-per-ms: 0.00005
    # Allow a little accumulated advantage before a setback, so a single odd tick
    # landing on a slab/chest edge doesn't rubber-band a legit player.
    rubberband-after-buildup: 3
    buildup-limit: 4
    rubberband-after-vl: 1
    # Grace window (ms) after a /fly toggle during which the offset is ignored —
    # toggling flight briefly desyncs the ability bit and spikes the prediction.
    # Raise if your flight plugin resyncs slowly.
    fly-toggle-grace-ms: 1000
    # Violations removed per second while the player isn't flagging. Kept high so
    # the occasional harmless physics blip between bursts of normal play fades out
    # before it can ever stack up to a punishment. A real fly/speed hack flags
    # every tick it's active, far faster than this clears.
    clear-per-second: 1.0

# Timer — detects clients running their game clock faster than real time.
# (These tuning keys use the name "TimerA"; the checks.TimerA block further down
#  controls its violations/alerts/punishment.)
TimerA:
    # How far a player's clock may fall BEHIND real time (ms) before the check
    # tightens up again. Behind a proxy hop + version translation, packet timing
    # naturally bunches up, so a generous value here avoids false flags. It only
    # affects the lower bound — running AHEAD (what a timer hack does) is still
    # caught regardless.
    max-behind-ms: 250.0
    # Violations removed per second while not flagging.
    clear-per-second: 0.5

PacketLimit:
    # Same proxy/ViaBackwards jitter slack as TimerA.max-behind-ms.
    max-behind-ms: 250.0
    clear-per-second: 0.5
    # Above this ping (ms), cap how much "fall behind" advantage accumulates,
    # to stop high-ping abuse. Raised from the 1000ms default since the proxy
    # hop itself adds baseline latency on top of the player's real ping.
    high-ping-cap-ms: 2000

Phase:
    rubberband-at: 1
    clear-per-second: 0.005

NoSlow:
    min-offset: 0.001
    rubberband-at: 5
    clear-per-second: 0.05

Knockback:
    buildup-keep-ratio: 0.999
    min-offset: 0.001
    instant-rubberband-offset: 0.1

#  ◆════════════════════════════════════════════════════════════════════════◆
#    CHECKS  ·  one block per check — the heart of the config
#  ◆════════════════════════════════════════════════════════════════════════◆
# Every check accepts the same keys:
#   enabled            — run the check at all
#   punishable         — may it run its punishment-commands, or only alert?
#   max-violations     — violations needed before the punishment fires
#   alert-interval     — alert every Nth violation (1 = every one)
#   dont-alert-until   — stay silent until this many violations have built up
#   alert-cooldown-ms  — minimum gap between two alerts for the same check
#   minimum-tps        — skip the check below this server TPS
#   punishment-commands — console commands run on punish (%player% %ping% ...)
# Anything omitted falls back to alert-defaults above.
# ─────────────────────────────────────────────────────────────────────────────
checks:

    # ── Movement ──────────────────────────────────────────────────────────────

    # MovementA — fly / speed / movement detection (the core check).
    # punishable:false by default — MovementA is the most
    # false-positive-prone check across mixed client versions (ViaBackwards/1.8),
    # so out of the box it only ALERTS staff, never kicks. Flip to true once
    # you've watched its flags on YOUR server and trust them.
    MovementA:
        enabled: true
        punishable: false
        # Raised from 24 — real logs showed a deterministic engine quirk (same
        # exact offset value across unrelated players, see MovementA.threshold
        # comment) sustaining for MINUTES and climbing VL into the 100s even
        # with decay active. A real continuous fly/speed hack still blows past
        # 40 within seconds; this just stops a long-lived non-cheat pattern
        # from ever reaching kick range.
        max-violations: 40
        alert-interval: 1
        dont-alert-until: 6           # Ignore the first 5 flags (lag spike tolerance)
        alert-cooldown-ms: 2000       # Max 1 alert per 2s (prevents 1-100 spam)
        minimum-tps: 19.5
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMovement&8 &7ping: %ping%ms&8)'

    # Knockback/AntiKB
    Knockback:
        enabled: true
        punishable: true
        max-violations: 15
        alert-interval: 1
        dont-alert-until: 5
        alert-cooldown-ms: 2000
        minimum-tps: 15.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # Phase through blocks
    Phase:
        enabled: true
        punishable: true
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1500
        minimum-tps: 15.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMovement&8 &7ping: %ping%ms&8)'

    # NoSlow (eating while moving)
    NoSlow:
        enabled: true
        punishable: true
        max-violations: 10
        alert-interval: 1
        dont-alert-until: 3
        alert-cooldown-ms: 1500
        minimum-tps: 15.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMovement&8 &7ping: %ping%ms&8)'

    # ── Player ────────────────────────────────────────────────────────────────

    # GUI/Inventory walk — moving while a container is open.
    # NOT punishable: the check already setbacks (rubber-bands) every tick the
    # cheat is active, which stops the movement. No kick — just block them.
    InventoryWalk:
        enabled: true
        punishable: false
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands: []

    # ── Combat ────────────────────────────────────────────────────────────────

    # Reach — simulation-based hit distance check
    Reach:
        enabled: true
        punishable: true
        max-violations: 12           # More chances before kick (PvP lag tolerance)
        alert-interval: 1
        dont-alert-until: 4
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # Reach (ReachB) — independent reach check with its own entity tracking +
    # light ping rewind. Alert-only by default: lag/desync on target positions
    # makes reach FP-prone, so it's padded and conservative — watch its flags and
    # tune ReachB.* below before enabling kicks.
    ReachB:
        enabled: true
        punishable: false
        max-violations: 12
        alert-interval: 1
        dont-alert-until: 4
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # AutoClicker A — statistical consistency
    AutoClickerA:
        enabled: true
        punishable: true
        max-violations: 12
        alert-interval: 1
        dont-alert-until: 1
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # AutoClicker B — multi-click in one tick
    AutoClickerB:
        enabled: true
        punishable: true
        # Raised from 10 — a chronically jittery connection (e.g. PojavLauncher
        # mobile network) was still slowly accumulating enough violations to get
        # kicked even after requiring repeated bursts.
        max-violations: 20
        alert-interval: 1
        dont-alert-until: 3
        alert-cooldown-ms: 500
        minimum-tps: 19.5
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # SelfInteract — attacking own entity (impossible in vanilla)
    SelfInteract:
        enabled: true
        punishable: true
        max-violations: 1
        alert-interval: 1
        dont-alert-until: 1
        alert-cooldown-ms: 0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # AutoBlock — attacking while blocking with a shield
    AutoBlock:
        enabled: true
        punishable: true
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # Criticals — fake critical hit via ground spoof during attack
    Criticals:
        enabled: true
        punishable: true
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # NoHitDelay — attack packets arriving faster than one tick apart
    NoHitDelay:
        enabled: true
        punishable: true
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # KillAura A — no-swing attack
    KillAuraA:
        enabled: true
        punishable: true
        max-violations: 10
        alert-interval: 1
        dont-alert-until: 1
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # KillAura B — multi-entity in one tick
    KillAuraB:
        enabled: true
        punishable: true
        max-violations: 8
        alert-interval: 1
        dont-alert-until: 1
        alert-cooldown-ms: 500
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # KillAura C — attacking while container GUI is open (impossible in vanilla)
    KillAuraC:
        enabled: true
        punishable: true
        max-violations: 2
        alert-interval: 1
        dont-alert-until: 1
        alert-cooldown-ms: 500
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # KillAura D — attacking entity while looking significantly away (angle check)
    KillAuraD:
        enabled: true
        punishable: true
        max-violations: 10
        alert-interval: 1
        dont-alert-until: 1
        alert-cooldown-ms: 800
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # Multitask — attacking while actively using an item (eating/potion/bow)
    Multitask:
        enabled: true
        punishable: true
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # FastUse — eating/drinking items faster than vanilla timing (1600ms minimum)
    # DISABLED by default: the RELEASE packet it measures is sent when a player
    # CANCELS eating (totally legit, happens constantly in PvP) — finishing an
    # item sends no packet at all. Consumption speed is server-timed anyway,
    # so FastUse hacks gain nothing on modern servers.
    FastUse:
        enabled: false
        punishable: false
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1500
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bCombat&8 &7ping: %ping%ms&8)'

    # BedAura — rapidly interacting with bed items to trigger explosions
    BedAura:
