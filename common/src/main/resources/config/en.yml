    AutoEat:
        enabled: true
        punishable: true
        max-violations: 6
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1500
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bPlayer&8 &7ping: %ping%ms&8)'

    # AutoWeapon — automatically switching to best weapon before every attack
    AutoWeapon:
