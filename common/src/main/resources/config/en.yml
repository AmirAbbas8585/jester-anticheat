        dont-alert-until: 1
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMining&8 &7ping: %ping%ms&8)'

    # FastBreak — breaking blocks too quickly
    FastBreak:
        enabled: true
        punishable: true
        max-violations: 8
        alert-interval: 1
        dont-alert-until: 3
        alert-cooldown-ms: 1500
        # FastBreak measures raw wall-clock milliseconds, so even a small TPS dip
        # (real log showed false flags at 18.98 TPS — only a ~5% dip) distorts its
        # timing enough to false-flag once minimum-tps is actually enforced (see
        # the Check.flag() fix). 14.0 was far too low to ever catch this.
        minimum-tps: 19.5
        punishment-commands:
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMining&8 &7ping: %ping%ms&8)'

