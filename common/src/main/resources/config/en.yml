    # ── Timer ─────────────────────────────────────────────────────────────────
    # NOTE: the Timer check's config name is "TimerA" (not "Timer"), so this
    # block MUST be keyed TimerA or it is silently ignored.
    TimerA:
        enabled: true
        # Alert-only by default for the beta — same proxy/ViaBackwards jitter
        # reasoning as PacketLimit. Flip to true once trusted on your server.
        punishable: false
        max-violations: 16           # More chances before kick (fewer false kicks)
        alert-interval: 1
        dont-alert-until: 6
        alert-cooldown-ms: 1500
        # Same reasoning as PacketLimit.minimum-tps above.
        minimum-tps: 19.0
        punishment-commands:
            # %ping% shows whether this was likely a real connection spike
            # (proxy hop, bad mobile connection) rather than an actual timer hack.
            - 'kick %player% &#c19a6bᴀᴄ &8» &fᴄʜᴇᴀᴛɪɴɢ ᴅᴇᴛᴇᴄᴛᴇᴅ &8(&#c19a6bMovement&8 &7ping: %ping%ms&8)'


# ─────────────────────────────────────────────────────────────────────────────
# Check-Specific Fine-Tuning
# These keys are read directly by each check's onReload method.
# ─────────────────────────────────────────────────────────────────────────────

# Reach — simulation-based combat hit distance (entity_interaction_range, 3.0).
# threshold is extra hitbox margin (blocks). 0.0005 is razor-thin and flags
# legit combat near the 3.0 boundary; 0.03 (one movement tick of uncertainty)
# absorbs that while still catching real reach (always 3.3+ blocks).
Reach:
    block-impossible-hits: true
    threshold: 0.05
    # Extra blocks of reach allowed on top of vanilla 3.0 before flagging.
    # 0.3 -> effective ~3.3-block limit.
    extra-reach: 0.3
    # Extra reach margin (blocks) while sneaking — the sneak eye-height change is
    # processed a tick late, briefly inflating the measured hit distance. Real
    # reach hacks are 3.3+ blocks, far beyond this.
    sneak-lenience: 0.1

# ReachB — our own reach check (entity tracking + ping rewind). A hit flags when
# eye-to-(padded)-hitbox distance exceeds: max-reach + base-lenience +
# ping*ping-lenience-per-ms, sustained min-consecutive times. Loosen the
# lenience values if legit high-ping PvP flags; tighten to catch smaller reach.
ReachB:
    max-reach: 3.4
    hitbox-pad: 0.30
    base-lenience: 0.30
    ping-lenience-per-ms: 0.003
    min-consecutive: 4

# AutoBlock — max ping before the check is skipped (ms)
AutoBlock:
    max-ping: 500

# Criticals — max ping before the check is skipped (ms)
Criticals:
    max-ping: 500

# NoHitDelay — attacks counted per client tick (immune to network jitter).
# A vanilla client may rarely fit 2 attacks in one tick; 3+ is a hack.
NoHitDelay:
    # Attacks within one client tick to count as a bad tick
    max-per-tick: 3
    # Consecutive bad ticks before flagging
    min-consecutive: 2

# FastUse — minimum item use duration in ms (vanilla food = 1600ms, potions = 1600ms)
FastUse:
    min-use-ms: 1500

# CrystalAura — only attacks on actual END_CRYSTAL entities count.
# Skilled crystal PvP legitimately reaches 12-16 interactions/sec.
CrystalAura:
    max-ips: 16
    min-place-detonate-ms: 50
    # Consecutive sub-50ms place->detonate cycles before flagging
    min-consecutive: 3

# VeinMiner — max COMPLETED block breaks (FINISHED_DIGGING) per second.
# Clicks and instant-break blocks are not counted.
VeinMiner:
    max-bps: 5

# FastBow — minimum bow charge time in ms before release is valid
FastBow:
    min-charge-ms: 45

# FastPlace — max blocks per second before flagging
# FastPlace — vanilla's 4-tick right-click cooldown caps placements at 5/sec
# regardless of click speed; 10 absorbs network jitter. Meteor FastUse ~20/sec.
FastPlace:
    max-bps: 10

# Tower — minimum milliseconds between consecutive under-self placements while jumping
Tower:
    min-interval-ms: 100
    # Consecutive too-fast placements before flagging (absorbs network jitter)
    min-consecutive: 2

# InventoryWalk — sustained movement with a container GUI open.
# Momentum slides and knockback die out within a few ticks; held movement keys
# don't. Flagging triggers a setback every tick, neutralizing the cheat.
InventoryWalk:
    # Horizontal blocks/tick below this counts as residual drift, not input
    min-speed: 0.10
    # Consecutive moving ticks (on the ground, not ice) before flag + immediate setback (~300ms)
    min-consecutive: 6

# KillAuraD — angle threshold for looking away from target
KillAuraD:
    # Entity position tracking lags moving targets — keep this high (135 = clearly behind)
    max-angle-deg: 135.0
    max-ping: 300
    # Consecutive bad-angle attacks required before flagging
    min-consecutive: 3

# NukerA — multi-block / break-rate detection.
# Raise these if you use area-break enchants (e.g. CrazyEnchantments Blast),
# whose extra block breaks the anticheat can't see in the packets and would
# otherwise read as nuking. Defaults match vanilla survival.
NukerA:
    # Max COMPLETED block breaks allowed within window-seconds before flagging.
    max-breaks-per-window: 15
    window-seconds: 3
    # Distinct blocks started in a single client tick before flagging.
    max-simultaneous: 3

# NukerB — direction-span detection thresholds
NukerB:
    max-span-degrees: 120.0
    max-creative-bps: 8

# AutoFish — minimum human reaction time after fish bite
AutoFish:
    min-react-ms: 150

# AutoArmor — burst detection thresholds
AutoArmor:
    # Maximum milliseconds window for counting rapid armor-slot clicks
    max-burst-ms: 250
    # How many DISTINCT armor slots clicked within the window before flagging
    # (double-clicks on a single slot never count twice)
    burst-threshold: 2

# AutoRespawn — minimum ms between death and respawn packet
AutoRespawn:
    min-respawn-ms: 300

# AutoTool — timing between held-item-change and start-digging
AutoTool:
    # Max ms between HELD_ITEM_CHANGE and START_DIGGING to count as a switch
    switch-ms: 50
    # How many consecutive fast-switch+dig events before flagging
    min-consecutive: 3

# FastBreak — how much faster than vanilla-predicted mining to tolerate.
# This check predicts how long a block SHOULD take to break from vanilla data
# (tool, Efficiency, Haste, attributes). Custom-enchant plugins make players mine
# faster than that prediction — vanilla Efficiency beyond level 5, or
# CrazyEnchantments enchants like Haste/Blast — which would otherwise false-flag.
# 2.0 = allow up to twice the predicted speed. Raise it if custom enchants still
# flag; on a vanilla-only server you can lower it toward 1.0 for stricter checks.
FastBreak:
    speed-tolerance: 2.0

# PacketMine — instant-break detection (sub-tick start->finish)
PacketMine:
    # Max ms between start-dig and finish-dig to count as instant.
    # Keep below 50 (1 tick) — legit 1-tick breaks arrive ~50ms apart.
    max-instant-ms: 30
    # Consecutive instant breaks before flagging (absorbs TCP packet bunching)
    min-consecutive: 3

# BedAura — maximum bed interactions per second
# Note: right-clicking any block while holding a bed also counts, so this
# must stay above human jitter-click range (~5-7/s)
BedAura:
    max-per-second: 8

# AnchorAura — maximum respawn anchor interactions per second
AnchorAura:
    max-per-second: 8

# AutoPot — minimum human reaction time after taking damage
AutoPot:
    min-react-ms: 80

# AutoWeapon — hotbar switch and attack in the SAME client tick, repeatedly.
# A human can scroll+click in one tick occasionally; the cheat does it every attack.
AutoWeapon:
    min-consecutive: 6

# AutoTotem — offhand totem restock reaction after a pop (ping-compensated)
AutoTotem:
    min-react-ms: 150
    min-consecutive: 2

# AutoEat — minimum human reaction time after a hunger drop. Eating isn't an
# emergency like combat damage, so this needs several consecutive fast
# reactions (min-consecutive) before it's treated as suspicious, not one.
AutoEat:
    min-react-ms: 100
    min-consecutive: 5

# AimA — aimbot GCD analysis. Rotations during combat must be multiples of the
# mouse sensitivity step; computed rotations (aimbot) have no common divisor.
AimA:
    # Unquantized significant rotations in a row before flagging
    min-consecutive: 15
    # Only judge rotations within this many ticks after an attack
    combat-window-ticks: 40

# TriggerBot — attack arriving within max-acquire-ticks of the crosshair
# landing on the target, min-consecutive times in a row (humans need 3-5 ticks)
TriggerBot:
    max-acquire-ticks: 1
    min-consecutive: 5
    max-ping: 400

# BoatFly — consecutive ascending vehicle-move packets with no water involved
BoatFly:
    min-rise-ticks: 15
    min-rise: 3.0

# BoatClip — max legitimate vehicle movement per packet (blue-ice racing ~3.5)
BoatClip:
    max-delta: 5.0
    min-consecutive: 2

# FireworkBoost — interval uniformity (CV) of rocket boosts while gliding.
# Human spam clicking has CV > 0.1; macros sit near 0.
FireworkBoost:
    window-size: 8
    max-cv: 0.06
    max-interval-ms: 1200

# NoJumpDelay — consecutive instant re-jump detection.
# A single fast re-jump is vanilla-possible (tapping jump on landing);
# the cheat re-jumps instantly on EVERY landing.
NoJumpDelay:
    # Land->jump gap below this counts toward the streak
    max-gap-ms: 150
    # Consecutive fast re-jumps before flagging
    min-consecutive: 6

# AutoParkour — edge-jump detection thresholds
AutoParkour:
    # Fraction of block depth (0-1) considered an "edge jump" (0.75 = last 25%)
    edge-threshold: 0.75
    # Number of jumps in the rolling analysis window (bigger = harder to false)
    window-size: 14
    # Fraction of window that must be edge-jumps to flag (0.93 ≈ 13/14).
    # A human, even a great parkour player, has more variance than this.
    min-edge-ratio: 0.93
    # Minimum horizontal speed (blocks/tick) to be considered parkour
    min-speed-bps: 0.15

# ScaffoldGoDown — descending staircase placement thresholds
ScaffoldGoDown:
    # Maximum ms between consecutive staircase placements
    max-interval-ms: 250
    # How many consecutive downward placements before flagging
    # (skilled manual down-bridgers can sustain short bursts — keep >= 6)
    min-consecutive: 6

# MeteorDetector — detection method toggles
MeteorDetector:
    # Method B (translation fingerprint): force-opens a sign editor once after
    # join — VISIBLE to the player as a brief popup. Enable only if that's
    # acceptable. The passive channel fingerprint (method A) is always active.
    sign-check: false

# AutoClickerA — click consistency analysis thresholds
AutoClickerA:
    # Maximum physically possible CPS; above this is flagged immediately.
    # 20.0 is the exact vanilla tick-rate ceiling (1 click/tick) with NO margin
    # for packet-timestamp jitter — a real log showed a legit player averaging
    # 49.8ms over a full 20-click window (cps=20.1), i.e. clicking essentially
    # exactly on every tick. Vanilla doesn't even register extra hits above
    # 20/sec anyway, so there's no exploit value between 20-21; raised to give
    # genuine max-speed clickers room without weakening detection of real
    # macros (which run well above this, e.g. 25-30+ CPS).
    max-cps: 21.0
    # Minimum coefficient of variation for human clicks (lower = auto-clicker)
    min-cv: 0.10
    # Rolling window of click intervals used for analysis
    window-size: 20
    # How many consecutive analysis windows must exceed max-cps before a CPS
    # violation counts — absorbs a single borderline window from a max-speed
    # human clicker sitting right on the vanilla tick ceiling.
    min-consecutive-cps: 2
    # Cancel-before-kick: instead of kicking the moment an auto-clicker is
    # detected, first NEUTRALISE it — the player's attack packets are silently
    # cancelled for cancel-duration-ms (their clicks land on nothing). A legit
    # borderline-fast clicker stops, the violations decay, and no kick happens. A
    # real macro keeps clicking through the dead window, keeps flagging, reaches
    # max-violations and only THEN gets kicked. Set cancel-before-kick:false to
    # go straight back to kicking on threshold.
    cancel-before-kick: true
    cancel-duration-ms: 3000

AutoClickerB:
    # Violations removed per second while not flagging. Kept high so a jittery
    # connection (e.g. a mobile client) that occasionally produces the
    # multi-swing-in-one-tick pattern clears between incidents instead of slowly
    # creeping toward a kick over a whole session.
    clear-per-second: 1.0
    # Number of multi-swing-in-one-tick bursts within burst-window-ms before a
    # violation is counted (a single coincidental burst is network noise, a real
    # macro does it repeatedly).
    min-bursts: 4
    burst-window-ms: 4000
    # Cancel-before-kick (see AutoClickerA): neutralise the extra swings for a
    # few seconds before any kick can happen.
    cancel-before-kick: true
    cancel-duration-ms: 3000

# Exploit toggles
exploit:
    allow-sprint-jumping-when-using-elytra: true

# ─────────────────────────────────────────────────────────────────────────────
# Legacy grouped punishments. The per-check "checks:" blocks above already drive
# alerts and kicks, so this section is optional and only used for [log] history
# entries and any extra grouped commands you choose to add here. [alert]/[proxy]/
# [webhook] entries are ignored here to avoid duplicate alerts.
# Format per command:  <threshold>:<interval> <command>   (interval 0 = once)
# ─────────────────────────────────────────────────────────────────────────────
Punishments:
    - checks:
          - '!BadPackets'
          - '!Crash'
      remove-violations-after: 300
      commands:
          - '1:1 [alert]'
          - '1:1 [log]'

    - checks:
          - 'BadPackets'
          - 'Crash'
      remove-violations-after: 300
      commands:
          - '1:1 [alert]'
          - '1:0 [log]'

# Setback block resync (fix ghost blocks)
disable-default-resync-handler: false
cancel-duplicate-packet: true
ignore-duplicate-packet-rotation: false

# Client brand alerts
client-brand:
    ignored-clients:
        - "^vanilla$"
        - "^fabric$"
        - "^lunarclient:v\\d+\\.\\d+\\.\\d+-\\d{4},(?:fabric|forge)$"
        - "^Feather Fabric$"
        - "^labymod$"
    disconnect-blacklisted-forge-versions: true

spectators:
    hide-regardless: false
    allowed-worlds:
        - ""

max-transaction-time: 60
disable-pong-cancelling: false

alerts-enabled: '%prefix% <white>ᴀʟᴇʀᴛꜱ</white> <color:#a9c8ff>ᴇɴᴀʙʟᴇᴅ</color>'
alerts-disabled: '%prefix% <white>ᴀʟᴇʀᴛꜱ</white> <color:#ff5348>ᴅɪꜱᴀʙʟᴇᴅ</color>'
verbose-enabled: '%prefix% <white>ᴠᴇʀʙᴏꜱᴇ</white> <color:#a9c8ff>ᴇɴᴀʙʟᴇᴅ</color>'
verbose-disabled: '%prefix% <white>ᴠᴇʀʙᴏꜱᴇ</white> <color:#ff5348>ᴅɪꜱᴀʙʟᴇᴅ</color>'
brands-enabled: '%prefix% <white>ʙʀᴀɴᴅꜱ</white> <color:#a9c8ff>ᴇɴᴀʙʟᴇᴅ</color>'
brands-disabled: '%prefix% <white>ʙʀᴀɴᴅꜱ</white> <color:#ff5348>ᴅɪꜱᴀʙʟᴇᴅ</color>'

