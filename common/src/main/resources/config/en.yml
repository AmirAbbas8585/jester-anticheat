    # FastBow — releasing bow before minimum charge time
    # DISABLED by default: tapping right-click on a bow sends draw+release
    # within <50ms legitimately (no arrow fires, but the packets are sent),
    # and the server computes arrow power from its own timer anyway — the
    # hack gains nothing on modern servers.
    FastBow:
        enabled: false
        punishable: false
        max-violations: 5
        alert-interval: 1
        dont-alert-until: 2
        alert-cooldown-ms: 1000
        minimum-tps: 14.0
